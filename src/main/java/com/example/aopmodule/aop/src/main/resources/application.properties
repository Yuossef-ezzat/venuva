# AOP Configuration
aop.enabled=true

# Logging
logging.level.io.github.microservices.aop=DEBUG
logging.level.AUDIT=INFO

# ===== LOGGING CONFIGURATION =====
logging.file.name=E:/Logs/venuvaAOP.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.file-name-pattern=E:/Logs/venuvaAOP-%d{yyyy-MM-dd}.%i.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{20} - %msg%n

# ===== Application Logging Levels =====
logging.level.com.example.venuva=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO